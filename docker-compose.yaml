version: "3.9"

services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      POSTGRES_DB: ${POSTGRES_DB:-visitordb}
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres} -d ${POSTGRES_DB:-visitordb}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

app:
    build: .
    restart: unless-stopped
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD:-postgres}@db:5432/${POSTGRES_DB:-visitordb}
      PORT: 8000
    ports:
      - "7123:8000"
    depends_on:
      db:
        condition: service_healthy
    labels:
      # Włącz rejestrację w Consul przez watcher → Traefik opublikuje pod domeną
      - "traefik.enable=true"
      # Router — nazwa spójna we wszystkich labelach
      - "traefik.http.routers.visitor-counter.rule=Host(`${APP_DOMAIN:-licznik.amniscode.dev}`)"
      - "traefik.http.routers.visitor-counter.entrypoints=websecure"
      - "traefik.http.routers.visitor-counter.tls=true"
      - "traefik.http.routers.visitor-counter.tls.certresolver=letsencrypt"
      # Port HOSTA — Traefik łączy się z workerem przez 10.220.14.15:7123
      - "traefik.http.services.visitor-counter.loadbalancer.server.port=7123"
volumes:
  pgdata:
