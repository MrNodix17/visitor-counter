version: "3.9"

services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      POSTGRES_DB: ${POSTGRES_DB:-visitordb}
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres} -d ${POSTGRES_DB:-visitordb}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  app:
    build: .
    restart: unless-stopped
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD:-postgres}@db:5432/${POSTGRES_DB:-visitordb}
      PORT: 8000
    ports:
      - "8080:8000"
    depends_on:
      db:
        condition: service_healthy
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.visitor-counter.rule=Host(`${APP_DOMAIN:-visitor.localhost}`)"
      - "traefik.http.routers.visitor-counter.entrypoints=websecure"
      - "traefik.http.routers.visitor-counter.tls.certresolver=letsencrypt"
      - "traefik.http.services.visitor-counter.loadbalancer.server.port=8000"

volumes:
  pgdata:
